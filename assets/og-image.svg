  </g>

  <text x="62" y="258" fill="#171a1d" font-family="Arial, Helvetica, sans-serif" font-size="86" font-weight="500" letter-spacing="-5">We make apps</text>
  <text x="62" y="359" fill="#ee3f36" font-family="Georgia, 'Times New Roman', serif" font-size="104" font-style="italic" letter-spacing="-5">people keep.</text>
  <text x="66" y="536" fill="#6d6d68" font-family="'Courier New', monospace" font-size="15" letter-spacing="2.4">INDEPENDENT PRODUCT STUDIO · IOS · ANDROID · WEB</text>

  <rect x="760" y="76" width="386" height="478" rx="82" fill="#fff" fill-opacity=".68" stroke="#fff" filter="url(#shadow)"/>
