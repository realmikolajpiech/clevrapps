      <stop stop-color="#ee3f36" stop-opacity=".15"/>
      <stop offset="1" stop-color="#ee3f36" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="22" stdDeviation="26" flood-color="#171a1d" flood-opacity=".14"/>
